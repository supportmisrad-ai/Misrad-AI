<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דוגמה - טופס לידים</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #1a202c;
        }
        p {
            color: #718096;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            padding: 16px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .required {
            color: #e53e3e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>בואו נדבר!</h1>
        <p>מלאו את הפרטים ונחזור אליכם בהקדם</p>
        
        <form id="lead-form">
            <div class="form-group">
                <label>שם מלא <span class="required">*</span></label>
                <input type="text" name="name" required placeholder="איך לפנות אליך?">
            </div>
            
            <div class="form-group">
                <label>אימייל <span class="required">*</span></label>
                <input type="email" name="email" required placeholder="email@example.com">
            </div>
            
            <div class="form-group">
                <label>טלפון</label>
                <input type="tel" name="phone" placeholder="050-1234567">
            </div>
            
            <div class="form-group">
                <label>שם החברה</label>
                <input type="text" name="company" placeholder="שם העסק שלך">
            </div>
            
            <div class="form-group">
                <label>הודעה</label>
                <textarea name="message" placeholder="במה נוכל לעזור?"></textarea>
            </div>
            
            <button type="submit" id="submit-btn">שלח פנייה</button>
        </form>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        // ⚠️ החלף את הערכים האלה!
        const API_URL = 'https://your-domain.com/api/public/leads';
        const API_KEY = 'YOUR_API_KEY_HERE';
        const ORG_SLUG = 'avoda-sheli'; // או slug אחר של הארגון שלך

        const form = document.getElementById('lead-form');
        const submitBtn = document.getElementById('submit-btn');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'שולח...';
            messageDiv.style.display = 'none';

            const formData = new FormData(form);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                phone: formData.get('phone') || undefined,
                company: formData.get('company') || undefined,
                message: formData.get('message') || undefined,
                source: 'landing-page',
                orgSlug: ORG_SLUG
            };

            try {
                const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ תודה! קיבלנו את פנייתך ונחזור אליך בקרוב';
                    messageDiv.style.display = 'block';
                    form.reset();
                } else {
                    throw new Error(result.error || 'שגיאה בשליחה');
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ אופס! משהו השתבש. נסה שוב או צור קשר ישירות';
                messageDiv.style.display = 'block';
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'שלח פנייה';
            }
        });
    </script>
</body>
</html>
