<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- System Logo - Modern system/gear design -->
  <defs>
    <linearGradient id="systemGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A21D3C"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#systemGradient)"/>
  <!-- Modern gear/system icon -->
  <circle cx="256" cy="256" r="120" stroke="white" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="256" cy="256" r="72" stroke="white" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="256" cy="256" r="24" fill="white"/>
</svg>

