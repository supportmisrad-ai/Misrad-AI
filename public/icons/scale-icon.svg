<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale Logo - Modern scale/balance design -->
  <rect width="512" height="512" rx="120" fill="url(#scaleGradient)"/>
  <defs>
    <linearGradient id="scaleGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <!-- Modern scale/balance icon -->
  <line x1="256" y1="120" x2="256" y2="380" stroke="white" stroke-width="20" stroke-opacity="0.9" stroke-linecap="round"/>
  <!-- Left scale -->
  <ellipse cx="150" cy="280" rx="80" ry="15" fill="white" fill-opacity="0.9"/>
  <line x1="150" y1="280" x2="256" y2="220" stroke="white" stroke-width="16" stroke-opacity="0.9" stroke-linecap="round"/>
  <!-- Right scale -->
  <ellipse cx="362" cy="280" rx="80" ry="15" fill="white" fill-opacity="0.9"/>
  <line x1="362" y1="280" x2="256" y2="220" stroke="white" stroke-width="16" stroke-opacity="0.9" stroke-linecap="round"/>
  <!-- Center balance point -->
  <circle cx="256" cy="220" r="18" fill="white" fill-opacity="0.95"/>
</svg>

